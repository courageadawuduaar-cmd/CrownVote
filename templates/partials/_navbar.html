{% load static %}

<style>
/* ── Navbar Base ── */
.navbar {
  display: flex;
  align-items: center;
  background: var(--ash);
  padding: 0 2rem;
  height: 68px;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 3px solid var(--gold);
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  text-decoration: none;
  flex-shrink: 0;
}

/* ── Search ── */
.nav-search {
  flex: 1;
  max-width: 340px;
  margin: 0 1.5rem;
  display: flex;
}

/* ── Clock ── */
.nav-clock {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-right: 1.25rem;
  white-space: nowrap;
  min-width: 90px;
}

/* ── Links ── */
.navbar-links {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  flex-shrink: 0;
}

.navbar-links a {
  color: var(--gray-300);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.2s;
  white-space: nowrap;
}

.navbar-links a:hover {
  color: var(--gold);
}

/* ── Hamburger ── */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 0.5rem;
  background: none;
  border: none;
  margin-left: auto;
  flex-shrink: 0;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: white;
  border-radius: 2px;
  transition: all 0.3s ease;
}

.hamburger.open span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
}
.hamburger.open span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

/* ── Mobile Menu Overlay ── */
.mobile-menu {
  display: none;
  position: fixed;
  top: 68px;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--ash);
  z-index: 999;
  flex-direction: column;
  padding: 2rem;
  gap: 0;
  overflow-y: auto;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.mobile-menu.open {
  display: flex;
}

.mobile-menu a {
  color: white;
  text-decoration: none;
  font-size: 1.1rem;
  font-weight: 600;
  padding: 1rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: block;
  transition: color 0.2s;
}

.mobile-menu a:hover {
  color: var(--gold);
}

.mobile-menu .mobile-search {
  margin-bottom: 1.5rem;
}

.mobile-menu .mobile-clock {
  text-align: center;
  padding: 1rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 0.5rem;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .nav-search    { display: none; }
  .nav-clock     { display: none; }
  .navbar-links  { display: none; }
  .hamburger     { display: flex; }
  .navbar        { padding: 0 1rem; }
}
</style>

<nav class="navbar">
  <!-- Brand -->
  <a href="/" class="navbar-brand">
    <img src="{% static 'images/crownvote.png' %}" alt="CrownVote"
         style="height:42px; width:42px; object-fit:contain; border-radius:6px;">
    <span style="color:white; font-size:1.4rem; font-weight:800; letter-spacing:-0.5px;">
      Crown<span style="color:var(--red);">Vote</span>
    </span>
  </a>

  <!-- Desktop Search -->
  <form method="get" action="/search/" class="nav-search">
    <div style="display:flex; width:100%; border-radius:8px; overflow:hidden; border:1.5px solid rgba(255,255,255,0.15);"
         id="navSearchWrap">
      <input type="text" name="q" placeholder="Search events, nominees..."
             style="flex:1; background:rgba(255,255,255,0.08); border:none; padding:0.5rem 1rem; color:white; font-size:0.88rem; outline:none; min-width:0;"
             onfocus="document.getElementById('navSearchWrap').style.borderColor='var(--gold)'"
             onblur="document.getElementById('navSearchWrap').style.borderColor='rgba(255,255,255,0.15)'">
      <button type="submit"
              style="background:var(--red); border:none; padding:0.5rem 0.9rem; color:white; cursor:pointer; font-size:0.9rem;">
        🔍
      </button>
    </div>
  </form>

  <!-- Desktop Clock -->
  <div class="nav-clock">
    <span id="clockTime" style="color:var(--gold); font-weight:700; font-size:0.9rem; font-family:monospace;"></span>
    <span id="clockDate" style="font-size:0.72rem; color:var(--gray-400); font-family:monospace;"></span>
  </div>

  <!-- Desktop Links -->
  <div class="navbar-links">
    <a href="/">Home</a>
    <a href="/events/">Events</a>
    <a href="/results/">Live Results</a>
    <a href="/accounts/contact/">Contact</a>
    {% if user.is_authenticated %}
      <a href="/dashboard/" style="color:var(--gold); font-weight:700;">📊 Dashboard</a>
      <a href="/accounts/logout/" class="btn btn-sm btn-outline">Logout</a>
    {% else %}
      <a href="/accounts/login/" class="btn btn-sm btn-gold">Organizer Login</a>
    {% endif %}
  </div>

  <!-- Hamburger Button -->
  <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">

  <!-- Mobile Search -->
  <div class="mobile-search">
    <form method="get" action="/search/">
      <div style="display:flex; border-radius:8px; overflow:hidden; border:1.5px solid rgba(255,255,255,0.2);">
        <input type="text" name="q" placeholder="Search events, nominees..."
               style="flex:1; background:rgba(255,255,255,0.08); border:none; padding:0.75rem 1rem; color:white; font-size:0.9rem; outline:none;">
        <button type="submit"
                style="background:var(--red); border:none; padding:0.75rem 1rem; color:white; cursor:pointer;">
          🔍
        </button>
      </div>
    </form>
  </div>

  <!-- Mobile Clock -->
  <div class="mobile-clock">
    <div style="color:var(--gold); font-weight:700; font-size:1rem; font-family:monospace;" id="mobileClockTime"></div>
    <div style="font-size:0.8rem; color:var(--gray-400); font-family:monospace; margin-top:0.2rem;" id="mobileClockDate"></div>
  </div>

  <!-- Mobile Links -->
  <a href="/" onclick="closeMobileMenu()">🏠 Home</a>
  <a href="/events/" onclick="closeMobileMenu()">🎉 Events</a>
  <a href="/results/" onclick="closeMobileMenu()">📊 Live Results</a>
  <a href="/accounts/contact/" onclick="closeMobileMenu()">📞 Contact</a>
  {% if user.is_authenticated %}
    <a href="/dashboard/" onclick="closeMobileMenu()" style="color:var(--gold);">📊 Dashboard</a>
    <a href="/accounts/logout/" onclick="closeMobileMenu()">🚪 Logout</a>
  {% else %}
    <a href="/accounts/login/" onclick="closeMobileMenu()" style="color:var(--gold);">🔐 Organizer Login</a>
  {% endif %}

</div>

<script>
// ── Clock ──
function updateClock() {
  const now     = new Date();
  let hours     = now.getHours();
  const mins    = String(now.getMinutes()).padStart(2, '0');
  const secs    = String(now.getSeconds()).padStart(2, '0');
  const ampm    = hours >= 12 ? 'PM' : 'AM';
  hours         = hours % 12 || 12;

  const days    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayName = days[now.getDay()];
  const monName = months[now.getMonth()];
  const date    = String(now.getDate()).padStart(2, '0');
  const year    = now.getFullYear();

  const timeStr = `${hours}:${mins}:${secs} ${ampm}`;
  const dateStr = `${dayName}, ${monName} ${date}, ${year}`;

  const ct = document.getElementById('clockTime');
  const cd = document.getElementById('clockDate');
  const mt = document.getElementById('mobileClockTime');
  const md = document.getElementById('mobileClockDate');

  if (ct) ct.textContent = timeStr;
  if (cd) cd.textContent = dateStr;
  if (mt) mt.textContent = timeStr;
  if (md) md.textContent = dateStr;
}

updateClock();
setInterval(updateClock, 1000);

// ── Mobile Menu ──
function toggleMobileMenu() {
  const menu      = document.getElementById('mobileMenu');
  const hamburger = document.getElementById('hamburger');
  menu.classList.toggle('open');
  hamburger.classList.toggle('open');
  // Prevent body scroll when menu is open
  document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
}

function closeMobileMenu() {
  const menu      = document.getElementById('mobileMenu');
  const hamburger = document.getElementById('hamburger');
  menu.classList.remove('open');
  hamburger.classList.remove('open');
  document.body.style.overflow = '';
}

// Close menu when clicking outside
document.addEventListener('click', function(e) {
  const menu      = document.getElementById('mobileMenu');
  const hamburger = document.getElementById('hamburger');
  const navbar    = document.querySelector('.navbar');
  if (menu.classList.contains('open') &&
      !menu.contains(e.target) &&
      !navbar.contains(e.target)) {
    closeMobileMenu();
  }
});
</script>
