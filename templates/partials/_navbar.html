{% load static %}
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <img src="{% static 'images/crownvote.png' %}" alt="CrownVote"
         style="height:42px; width:42px; object-fit:contain; border-radius:6px;">
    <span style="color:var(--white); font-size:1.4rem; font-weight:800; letter-spacing:-0.5px;">
      Crown<span style="color:var(--red);">Vote</span>
    </span>
  </a>

  <!-- Navbar Search -->
  <form method="get" action="/search/" id="navSearchForm"
        style="flex:1; max-width:340px; margin:0 2rem; display:flex;">
    <div style="display:flex; width:100%; border-radius:8px; overflow:hidden; border:1.5px solid rgba(255,255,255,0.15); transition:border-color 0.2s;"
         id="navSearchWrap">
      <input type="text" name="q" placeholder="Search events, nominees..."
             style="flex:1; background:rgba(255,255,255,0.08); border:none; padding:0.5rem 1rem; color:white; font-size:0.88rem; outline:none; min-width:0;"
             onfocus="document.getElementById('navSearchWrap').style.borderColor='var(--gold)'"
             onblur="document.getElementById('navSearchWrap').style.borderColor='rgba(255,255,255,0.15)'">
      <button type="submit"
              style="background:var(--red); border:none; padding:0.5rem 0.9rem; color:white; cursor:pointer; font-size:0.9rem; transition:background 0.2s;"
              onmouseover="this.style.background='var(--red-dark)'"
              onmouseout="this.style.background='var(--red)'">
        🔍
      </button>
    </div>
  </form>

  <!-- Live Clock -->
  <div id="liveClock"
       style="color:var(--gray-400); font-size:0.78rem; font-family:monospace; white-space:nowrap; margin-right:1.25rem; display:flex; flex-direction:column; align-items:center; line-height:1.3; min-width:90px;">
    <span id="clockTime" style="color:var(--gold); font-weight:700; font-size:0.9rem;"></span>
    <span id="clockDate" style="font-size:0.72rem; color:var(--gray-400);"></span>
  </div>

  <div class="navbar-links" id="navLinks">
    <a href="/">Home</a>
    <a href="/events/">Events</a>
    <a href="/results/">Live Results</a>
    <a href="/accounts/contact/">Contact</a>
    {% if user.is_authenticated %}
      <a href="/dashboard/" style="color:var(--gold); font-weight:700;">📊 Dashboard</a>
      <a href="/accounts/logout/" class="btn btn-sm btn-outline">Logout</a>
    {% else %}
      <a href="/accounts/login/" class="btn btn-sm btn-gold">Organizer Login</a>
    {% endif %}
  </div>

  <button class="navbar-toggle" id="navToggle" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
</nav>

<script>
function updateClock() {
  const now  = new Date();

  // Time — 12hr format with AM/PM
  let hours   = now.getHours();
  const mins  = String(now.getMinutes()).padStart(2, '0');
  const secs  = String(now.getSeconds()).padStart(2, '0');
  const ampm  = hours >= 12 ? 'PM' : 'AM';
  hours       = hours % 12 || 12;

  // Date — e.g. "Wed, May 06, 2026"
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun',
                  'Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayName  = days[now.getDay()];
  const monthName = months[now.getMonth()];
  const date     = String(now.getDate()).padStart(2, '0');
  const year     = now.getFullYear();

  document.getElementById('clockTime').textContent =
    `${hours}:${mins}:${secs} ${ampm}`;
  document.getElementById('clockDate').textContent =
    `${dayName}, ${monthName} ${date}, ${year}`;
}

updateClock();
setInterval(updateClock, 1000);
</script>
